naftiko: 1.0.0-alpha1
info:
  label: Amplitude Experimentation
  description: Manage and evaluate A/B experiments and feature flags. For product managers.
  tags:
  - Amplitude
  - Experimentation
  - Feature Flags
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
capability:
  consumes:
  - import: experiment-evaluation-api
    location: ./shared/experiment-evaluation-api.yaml
  - import: experiment-management-api
    location: ./shared/experiment-management-api.yaml
  exposes:
  - type: rest
    port: 8082
    namespace: amplitude-experimentation-api
    description: REST API for Amplitude Experimentation
    resources:
    - path: /v1/evaluation
      name: evaluation
      operations:
      - method: GET
        name: evaluateVariantsGet
        description: Amplitude Evaluate Variants for a User via GET
        call: experiment-evaluation-api.evaluateVariantsGet
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/evaluation
      name: evaluation
      operations:
      - method: POST
        name: evaluateVariants
        description: Amplitude Evaluate Variants for a User
        call: experiment-evaluation-api.evaluateVariants
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/flags
      name: flags
      operations:
      - method: GET
        name: getFlags
        description: Amplitude Get Flag Configurations
        call: experiment-evaluation-api.getFlags
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/flags
      name: flags
      operations:
