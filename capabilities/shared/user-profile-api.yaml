naftiko: 1.0.0-alpha1
info:
  label: Amplitude User Profile API
  description: The Amplitude User Profile API serves user profiles that include user properties, computed user properties, a list of cohort IDs the user belongs to, and personalized recommendations. 
    It enables real-time access to enriched user data for powering personalization engines, in-app experiences, and targeted content delivery. This API is particularly useful for retrieving 
    recommendation results generated by Amplitude's machine learning models.
  tags:
  - Amplitude
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
capability:
  consumes:
  - type: http
    namespace: user-profile-api
    baseUri: https://profile-api.amplitude.com
    description: The Amplitude User Profile API serves user profiles that include user properties, computed user properties, a list of cohort IDs the user belongs to, and personalized recommendations.
      It enables real-time access to enriched user data for powering personalization engines, in-app experiences, and targeted content delivery. This API is particularly useful for retrieving 
      recommendation results generated by Amplitude's machine learning models.
    resources:
    - name: profiles
      path: /profiles
      description: Profiles operations
      operations:
      - name: getUserProfile
        method: GET
        description: Amplitude Get a User Profile
        inputParameters:
        - name: user_id
          in: query
          type: string
          required: true
          description: The user_id of the user whose profile to retrieve.
        - name: comp_id
          in: query
          type: integer
          required: false
          description: The computed property ID or recommendation ID to retrieve specific computed results for the user.
        - name: get_recs
          in: query
          type: boolean
          required: false
          description: When true, include personalized recommendations in the response.
        - name: rec_id
          in: query
          type: string
          required: false
          description: The recommendation model ID to retrieve specific recommendation results.
        - name: rec_type
          in: query
          type: string
          required: false
          description: The type of recommendation to retrieve.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of recommendation results to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AMPLITUDE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    port: 8113
    namespace: user-profile-api-rest
    resources:
    - path: /v1/profiles
      name: profiles
      description: Profiles operations
      operations:
      - method: GET
        name: getUserProfile
        description: Amplitude Get a User Profile
        call: user-profile-api.getUserProfile
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9113
    namespace: user-profile-api-mcp
    transport: http
    tools:
    - name: getUserProfile
      description: Amplitude Get a User Profile
      hints:
        readOnly: true
      call: user-profile-api.getUserProfile
      with: {}
      outputParameters:
      - type: object
        mapping: $.
