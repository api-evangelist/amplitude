naftiko: 1.0.0-alpha1
info:
  label: Amplitude Experiment Evaluation API
  description: The Amplitude Experiment Evaluation API retrieves variant assignment data for users through remote evaluation. When called, it evaluates targeting rules and returns the assigned variant
    for each active experiment or feature flag. The API also tracks assignment events automatically in Amplitude Analytics. It is used by server-side applications that need to determine which 
    experiment variant or feature flag value to serve to a given user in real time.
  tags:
  - Amplitude
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
capability:
  consumes:
  - type: http
    namespace: experiment-evaluation-api
    baseUri: https://api.lab.amplitude.com
    description: The Amplitude Experiment Evaluation API retrieves variant assignment data for users through remote evaluation. When called, it evaluates targeting rules and returns the assigned 
      variant for each active experiment or feature flag. The API also tracks assignment events automatically in Amplitude Analytics. It is used by server-side applications that need to determine 
      which experiment variant or feature flag value to serve to a given user in real time.
    resources:
    - name: evaluation
      path: /evaluation
      description: Evaluation operations
      operations:
      - name: evaluateVariantsGet
        method: GET
        description: Amplitude Evaluate Variants for a User via GET
        inputParameters:
        - name: user_id
          in: query
          type: string
          required: false
          description: The user ID to evaluate variants for.
        - name: device_id
          in: query
          type: string
          required: false
          description: The device ID to evaluate variants for.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: evaluateVariants
        method: POST
        description: Amplitude Evaluate Variants for a User
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flags
      path: /flags
      description: Flags operations
      operations:
      - name: getFlags
        method: GET
        description: Amplitude Get Flag Configurations
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AMPLITUDE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    port: 8105
    namespace: experiment-evaluation-api-rest
    resources:
    - path: /v1/evaluation
      name: evaluation
      description: Evaluation operations
      operations:
      - method: GET
        name: evaluateVariantsGet
        description: Amplitude Evaluate Variants for a User via GET
        call: experiment-evaluation-api.evaluateVariantsGet
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/evaluation
      name: evaluation
      description: Evaluation operations
      operations:
      - method: POST
        name: evaluateVariants
        description: Amplitude Evaluate Variants for a User
        call: experiment-evaluation-api.evaluateVariants
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/flags
      name: flags
      description: Flags operations
      operations:
      - method: GET
        name: getFlags
        description: Amplitude Get Flag Configurations
        call: experiment-evaluation-api.getFlags
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9105
    namespace: experiment-evaluation-api-mcp
    transport: http
    tools:
    - name: evaluateVariantsGet
      description: Amplitude Evaluate Variants for a User via GET
      hints:
        readOnly: true
      call: experiment-evaluation-api.evaluateVariantsGet
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: evaluateVariants
      description: Amplitude Evaluate Variants for a User
      hints:
        readOnly: false
      call: experiment-evaluation-api.evaluateVariants
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: getFlags
      description: Amplitude Get Flag Configurations
      hints:
        readOnly: true
      call: experiment-evaluation-api.getFlags
      with: {}
      outputParameters:
      - type: object
        mapping: $.
