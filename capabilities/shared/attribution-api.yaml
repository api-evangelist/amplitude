naftiko: 1.0.0-alpha1
info:
  label: Amplitude Attribution API
  description: The Amplitude Attribution API allows developers to send attribution campaign events to Amplitude from ad networks, attribution providers, or custom marketing tools. It associates users 
    with the campaigns, channels, and creatives that drove their acquisition or re-engagement. This API is used to enrich Amplitude user profiles with marketing attribution data for campaign 
    performance analysis and ROI measurement.
  tags:
  - Amplitude
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
capability:
  consumes:
  - type: http
    namespace: attribution-api
    baseUri: https://api2.amplitude.com
    description: The Amplitude Attribution API allows developers to send attribution campaign events to Amplitude from ad networks, attribution providers, or custom marketing tools. It associates 
      users with the campaigns, channels, and creatives that drove their acquisition or re-engagement. This API is used to enrich Amplitude user profiles with marketing attribution data for campaign 
      performance analysis and ROI measurement.
    resources:
    - name: attribution
      path: /attribution
      description: Attribution operations
      operations:
      - name: sendAttribution
        method: POST
        description: Amplitude Send Attribution Data
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8100
    namespace: attribution-api-rest
    resources:
    - path: /v1/attribution
      name: attribution
      description: Attribution operations
      operations:
      - method: POST
        name: sendAttribution
        description: Amplitude Send Attribution Data
        call: attribution-api.sendAttribution
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9100
    namespace: attribution-api-mcp
    transport: http
    tools:
    - name: sendAttribution
      description: Amplitude Send Attribution Data
      hints:
        readOnly: false
      call: attribution-api.sendAttribution
      with: {}
      outputParameters:
      - type: object
        mapping: $.
