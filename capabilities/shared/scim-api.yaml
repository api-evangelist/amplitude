naftiko: 1.0.0-alpha1
info:
  label: Amplitude SCIM API
  description: The Amplitude SCIM API implements the System for Cross-domain Identity Management (SCIM) 2.0 standard for automated user provisioning and deprovisioning. It allows identity providers 
    such as Okta, Azure AD, and OneLogin to automatically create, update, and deactivate user accounts in Amplitude. This API is essential for enterprise organizations that need centralized user 
    lifecycle management and compliance with security policies.
  tags:
  - Amplitude
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
