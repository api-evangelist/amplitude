naftiko: 1.0.0-alpha1
info:
  label: Amplitude Taxonomy API
  description: The Amplitude Taxonomy API provides programmatic management of your analytics tracking plan. It supports creating, reading, updating, and deleting event categories, event types, event 
    properties, and user properties. This API is essential for data governance workflows, enabling teams to maintain a consistent and well-organized event taxonomy across their instrumentation without
    needing to use the Amplitude UI directly.
  tags:
  - Amplitude
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
capability:
  consumes:
  - type: http
    namespace: taxonomy-api
    baseUri: https://amplitude.com
    description: The Amplitude Taxonomy API provides programmatic management of your analytics tracking plan. It supports creating, reading, updating, and deleting event categories, event types, event
      properties, and user properties. This API is essential for data governance workflows, enabling teams to maintain a consistent and well-organized event taxonomy across their instrumentation 
      without needing to use the Amplitude UI directly.
    resources:
    - name: event-categories
      path: /event-categories
      description: Event Categories operations
      operations:
      - name: listEventCategories
        method: GET
        description: Amplitude List All Event Categories
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createEventCategory
        method: POST
        description: Amplitude Create an Event Category
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getEventCategory
        method: GET
        description: Amplitude Get an Event Category
        inputParameters:
        - name: param
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateEventCategory
        method: PUT
        description: Amplitude Update an Event Category
        inputParameters:
        - name: param
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteEventCategory
        method: DELETE
        description: Amplitude Delete an Event Category
        inputParameters:
        - name: param
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
