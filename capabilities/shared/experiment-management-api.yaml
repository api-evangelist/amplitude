      - name: listExperiments
        method: GET
        description: Amplitude List All Experiments
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of experiments to return.
        - name: cursor
          in: query
          type: string
          required: false
          description: A cursor for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createExperiment
