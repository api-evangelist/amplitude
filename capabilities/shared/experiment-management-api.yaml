      flags, as well as managing deployments, variants, holdout groups, and mutual exclusion groups. This API enables teams to integrate experiment lifecycle management into their CI/CD pipelines, 
      automate flag rollouts, and manage experimentation workflows without using the Amplitude UI.
    resources:
    - name: flags
      path: /flags
      description: Flags operations
      operations:
      - name: listFlags
        method: GET
        description: Amplitude List All Flags
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of flags to return.
        - name: cursor
          in: query
          type: string
          required: false
          description: A cursor for pagination returned from a previous request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createFlag
        method: POST
        description: Amplitude Create a Flag
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
