naftiko: 1.0.0-alpha1
info:
  label: Amplitude Chart Annotations API
  description: The Amplitude Chart Annotations API enables developers to programmatically create, retrieve, update, and delete annotations on Amplitude charts. Annotations mark significant events such
    as product releases, marketing campaigns, or incidents on timeline-based charts. This API allows teams to automate annotation management as part of their deployment or release pipelines, ensuring 
    that important context is always visible alongside analytics data.
  tags:
  - Amplitude
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMPLITUDE_API_KEY: AMPLITUDE_API_KEY
capability:
